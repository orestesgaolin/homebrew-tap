name: Update git_branches Formula
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Print environment info
        run: |
          echo "GITHUB_REF: $GITHUB_REF"
          echo "GITHUB_SHA: $GITHUB_SHA"
          echo "GITHUB_ACTOR: $GITHUB_ACTOR"
          env | sort

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Fetch latest git_branches release
        id: fetch_release
        run: |
          echo "Fetching latest git_branches release..."
          releases_json=$(curl -s https://api.github.com/repos/orestesgaolin/dart_utilities/releases)
          echo "Releases JSON: $releases_json" | head -c 1000
          latest_release=$(echo "$releases_json" | jq -r '[.[] | select(.tag_name | startswith("git_branches-v"))][0].tag_name')
          echo "Latest release tag: $latest_release"
          echo "latest_release=$latest_release" >> $GITHUB_OUTPUT

      - name: Check if formula already targets latest release
        id: check_version
        run: |
          current_release=$(sed -n 's|.*archive/refs/tags/\(.*\)\.tar\.gz.*|\1|p' git_branches.rb | head -n 1)
          echo "Current formula release tag: $current_release"
          if [ "$current_release" = "${{ steps.fetch_release.outputs.latest_release }}" ]; then
            echo "Formula already targets the latest release."
            echo "needs_update=false" >> $GITHUB_OUTPUT
          else
            echo "needs_update=true" >> $GITHUB_OUTPUT
          fi

      - name: Skip when formula is current
        if: steps.check_version.outputs.needs_update != 'true'
        run: echo "No update needed for git_branches.rb"

      - name: Download source tarball and calculate sha256
        id: get_sha
        if: steps.check_version.outputs.needs_update == 'true'
        run: |
          url="https://github.com/orestesgaolin/dart_utilities/archive/refs/tags/${{ steps.fetch_release.outputs.latest_release }}.tar.gz"
          echo "Downloading source tarball from $url"
          curl -L "$url" -o source.tar.gz
          echo "Calculating sha256 for source.tar.gz..."
          sha256=$(shasum -a 256 source.tar.gz | awk '{print $1}')
          echo "Source tarball sha256: $sha256"
          echo "url=$url" >> $GITHUB_OUTPUT
          echo "sha256=$sha256" >> $GITHUB_OUTPUT

      - name: Download binaries and calculate checksums
        id: get_binaries
        if: steps.check_version.outputs.needs_update == 'true'
        run: |
          set -e
          tag="${{ steps.fetch_release.outputs.latest_release }}"
          declare -A binaries
          binaries["git_branches_macos"]=""
          binaries["git_branches_linux"]=""
          binaries["git_branches.exe"]=""
          for bin in "${!binaries[@]}"; do
            url="https://github.com/orestesgaolin/dart_utilities/releases/download/$tag/$bin"
            echo "Downloading binary $bin from $url"
            curl -L "$url" -o "$bin"
            echo "Calculating sha256 for $bin..."
            checksum=$(shasum -a 256 "$bin" | awk '{print $1}')
            output_name=$(echo "$bin" | tr '.-' '__')
            echo "Binary $bin sha256: $checksum"
            echo "$output_name=$checksum" >> $GITHUB_OUTPUT
          done

      - name: Update git_branches.rb
        if: steps.check_version.outputs.needs_update == 'true'
        run: |
          echo "Updating git_branches.rb with new release info..."
          sed -i "s|url \".*\"|url \"${{ steps.get_sha.outputs.url }}\"|" git_branches.rb
          sed -i "s|sha256 \".*\"|sha256 \"${{ steps.get_sha.outputs.sha256 }}\"|" git_branches.rb
          # Update binary_url tag
          sed -i "s|binary_url = \"https://github.com/orestesgaolin/dart_utilities/releases/download/git_branches-v[0-9.]*|binary_url = \"https://github.com/orestesgaolin/dart_utilities/releases/download/${{ steps.fetch_release.outputs.latest_release }}|" git_branches.rb
          sed -i "s|when \"git_branches_macos\" then \"[a-f0-9]*\"|when \"git_branches_macos\" then \"${{ steps.get_binaries.outputs.git_branches_macos }}\"|" git_branches.rb
          sed -i "s|when \"git_branches_linux\" then \"[a-f0-9]*\"|when \"git_branches_linux\" then \"${{ steps.get_binaries.outputs.git_branches_linux }}\"|" git_branches.rb
          sed -i "s|when \"git_branches.exe\" then \"[a-f0-9]*\"|when \"git_branches.exe\" then \"${{ steps.get_binaries.outputs.git_branches_exe }}\"|" git_branches.rb

      - name: Commit and tag changes
        if: steps.check_version.outputs.needs_update == 'true'
        run: |
          echo "Committing and tagging changes..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add git_branches.rb
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          version="${{ steps.fetch_release.outputs.latest_release }}"
          echo "Committing git_branches.rb for version $version"
          git commit -m "chore: update git_branches formula to $version"
          if git rev-parse "$version" >/dev/null 2>&1; then
            echo "Tag $version already exists; pushing commit without creating a new tag."
            git push origin main
            exit 0
          fi
          echo "Tagging commit with $version"
          git tag "$version"
          echo "Pushing changes to main and tags..."
          git push origin main --tags
